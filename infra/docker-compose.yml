# Local dev compose. Not required for `make demo` — Python and TS can run on host.
version: "3.9"

services:
  wallet:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../:/app
    env_file: ../.env
    command: sh -c "npm install && npm run start"
    ports:
      - "8787:8787"

  orchestrator:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ../:/app
    env_file: ../.env
    command: sh -c "pip install -e . && python -m honeybee.orchestrator"
    depends_on:
      - wallet
